<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F7F5F0">
<title>카드 지출 장부</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231B2A4A'/><rect x='20' y='32' width='60' height='40' rx='6' fill='%23F7F5F0'/><rect x='20' y='40' width='60' height='8' fill='%23F2B705'/></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@700&family=IBM+Plex+Sans+KR:wght@400;500;600&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'IBM Plex Sans KR', sans-serif;
  background: #F7F5F0; color: #26241F;
  padding: 20px 16px calc(48px + env(safe-area-inset-bottom));
  max-width: 480px; margin: 0 auto; min-height: 100vh;
}
input, select, button { font-family: 'IBM Plex Sans KR', sans-serif; font-size: 14px; }
input, select {
  padding: 10px; border-radius: 9px; border: 1px solid #DDD8CC;
  background: #FAFAF7; min-width: 0; width: 100%;
}
input:focus, select:focus { outline: 2px solid #1B2A4A; outline-offset: 1px; }
button { cursor: pointer; }
button:active { transform: scale(0.97); }

.title { font-family: 'Gowun Batang', serif; font-size: 22px; font-weight: 700; color: #1B2A4A; margin-bottom: 12px; }
.month-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.nav-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid #DDD8CC; background: #FFF; font-size: 18px; color: #1B2A4A; }
.month-label { font-size: 16px; font-weight: 600; }
.total-box { display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
.total-label { font-size: 13px; color: #8A8578; }
.total-amount { font-size: 28px; font-weight: 600; color: #1B2A4A; letter-spacing: -0.5px; }
.total-amount .won { font-size: 15px; font-weight: 400; margin-left: 2px; }
.chip-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 18px; }
.card-chip { min-width: 116px; background: #FFF; border-radius: 12px; padding-bottom: 10px; border: 1px solid #E6E1D5; overflow: hidden; flex-shrink: 0; }
.chip-band { height: 6px; margin-bottom: 8px; }
.chip-name { font-size: 11px; color: #8A8578; padding: 0 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chip-amount { font-size: 14px; font-weight: 600; padding: 2px 10px 0; }

.form { background: #FFF; border-radius: 14px; padding: 12px; border: 1px solid #E6E1D5; margin-bottom: 16px; }
.form-row { display: flex; gap: 8px; margin-bottom: 8px; }
.form-row:last-child { margin-bottom: 0; }
.add-btn { padding: 10px 18px; border-radius: 9px; border: none; background: #1B2A4A; color: #FFF; font-weight: 600; flex-shrink: 0; }
.add-btn:disabled { opacity: 0.4; }
.save-note { font-size: 12px; color: #2FA36B; text-align: right; height: 16px; margin-top: 4px; }

.tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.tab { flex: 1; padding: 9px 0; border-radius: 9px; border: 1px solid #DDD8CC; background: #FFF; color: #8A8578; }
.tab.on { background: #1B2A4A; color: #FFF; border-color: #1B2A4A; font-weight: 600; }

.empty { text-align: center; color: #8A8578; font-size: 14px; padding: 36px 0; }
.group-head { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; padding: 0 4px 6px; border-bottom: 1px dashed #DDD8CC; margin-bottom: 6px; }
.group-head .sub { color: #8A8578; font-weight: 400; }
.group { margin-bottom: 16px; }
.item { display: flex; align-items: center; gap: 10px; background: #FFF; border-radius: 10px; padding: 10px; margin-bottom: 6px; border: 1px solid #EEE9DE; }
.item-bar { width: 4px; align-self: stretch; border-radius: 2px; flex-shrink: 0; }
.item-body { flex: 1; min-width: 0; }
.item-top { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }
.item-cat { font-size: 14px; font-weight: 500; }
.item-sub { font-size: 11px; color: #8A8578; }
.item-memo { font-size: 12px; color: #6B675C; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.item-amount { font-size: 14px; font-weight: 600; flex-shrink: 0; }
.del-btn { width: 26px; height: 26px; border-radius: 7px; border: none; background: transparent; color: #B8B2A3; font-size: 16px; flex-shrink: 0; }

.bar-track { height: 8px; background: #E6E1D5; border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; background: #1B2A4A; border-radius: 4px; transition: width 0.3s; }
.hint { font-size: 12px; color: #8A8578; margin-bottom: 12px; line-height: 1.5; }
.manage-title { font-size: 15px; font-weight: 600; margin: 0 0 10px; color: #1B2A4A; }
.manage-title.gap { margin-top: 24px; }
.pill-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.cat-pill { display: inline-flex; align-items: center; gap: 4px; background: #FFF; border: 1px solid #DDD8CC; border-radius: 999px; padding: 5px 6px 5px 12px; font-size: 13px; }
.pill-del { border: none; background: transparent; color: #B8B2A3; font-size: 14px; width: 18px; padding: 0; }
.color-dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
.backup-btn { width: 100%; padding: 11px 0; border-radius: 9px; border: 1px solid #DDD8CC; background: #FFF; color: #1B2A4A; font-weight: 500; margin-bottom: 8px; }
</style>
</head>
<body>

<header>
  <div class="title">카드 지출 장부</div>
  <div class="month-nav">
    <button class="nav-btn" onclick="shiftMonth(-1)" aria-label="이전 달">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" onclick="shiftMonth(1)" aria-label="다음 달">›</button>
  </div>
  <div class="total-box">
    <span class="total-label">이번 달 합계</span>
    <span class="total-amount"><span id="totalAmount">0</span><span class="won">원</span></span>
  </div>
  <div class="chip-row" id="chipRow"></div>
</header>

<section class="form">
  <div class="form-row">
    <input type="date" id="fDate" style="flex:1">
    <select id="fCard" style="flex:1.2"></select>
  </div>
  <div class="form-row">
    <input inputmode="numeric" placeholder="금액" id="fAmount" style="flex:1.2;font-weight:600">
    <select id="fCategory" style="flex:1"></select>
  </div>
  <div class="form-row">
    <input placeholder="메모 (예: 빈티드 던스 니트)" id="fMemo" style="flex:1">
    <button class="add-btn" id="addBtn" onclick="addExpense()">기록</button>
  </div>
  <div class="save-note" id="saveNote"></div>
</section>

<nav class="tabs">
  <button class="tab on" data-tab="list" onclick="setTab('list')">내역</button>
  <button class="tab" data-tab="cat" onclick="setTab('cat')">카테고리</button>
  <button class="tab" data-tab="settle" onclick="setTab('settle')">관리</button>
  <button class="tab" data-tab="settings" onclick="setTab('settings')">설정</button>
</nav>

<main id="content"></main>

<script>
// ---------- 기본 데이터 ----------
const DEFAULT_CARDS = [
  { id: "c1", name: "KB NEED 글로벌", color: "#F2B705" },
  { id: "c2", name: "롯데 VEEX II", color: "#D93B3B" },
  { id: "c3", name: "카카오뱅크 신한", color: "#3B6FD9" },
];
const DEFAULT_CATEGORIES = ["리틀루트", "노베른", "당근", "쮸말랭", "생활비"];
const CARD_COLORS = ["#F2B705","#D93B3B","#3B6FD9","#2FA36B","#8A5CD9","#E0762F","#4A4A4A","#D95CA0"];
const KEY = "card-expense-data-v1";

let cards = [...DEFAULT_CARDS];
let categories = [...DEFAULT_CATEGORIES];
let expenses = [];
let tab = "list";

const fmt = n => (Number(n)||0).toLocaleString("ko-KR");
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const todayStr = () => {
  const d = new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
};
let month = todayStr().slice(0,7);

// ---------- 저장/불러오기 (localStorage) ----------
function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d.cards && d.cards.length) cards = d.cards;
      if (d.categories && d.categories.length) categories = d.categories;
      if (d.expenses) expenses = d.expenses.map(e => ({ settled:false, ...e }));
    }
  } catch(e) {}
}
function save() {
  try {
    localStorage.setItem(KEY, JSON.stringify({ cards, categories, expenses }));
    const n = document.getElementById("saveNote");
    n.textContent = "저장됐어요 ✓";
    setTimeout(() => n.textContent = "", 1500);
  } catch(e) {
    alert("저장에 실패했어요. 브라우저 저장 공간을 확인해 주세요.");
  }
}

// ---------- 지출 ----------
function addExpense() {
  const amt = Number(document.getElementById("fAmount").value.replace(/[^0-9]/g,""));
  if (!amt) return;
  const date = document.getElementById("fDate").value || todayStr();
  expenses.unshift({
    id: Date.now().toString(36),
    date,
    cardId: document.getElementById("fCard").value,
    amount: amt,
    category: document.getElementById("fCategory").value,
    memo: document.getElementById("fMemo").value.trim(),
    settled: false,
  });
  document.getElementById("fAmount").value = "";
  document.getElementById("fMemo").value = "";
  month = date.slice(0,7);
  save(); render();
}
function removeExpense(id) {
  if (!confirm("이 기록을 완전히 삭제할까요? 모든 탭에서 사라져요.")) return;
  expenses = expenses.filter(e => e.id !== id);
  save(); render();
}
function settleExpense(id) {
  const e = expenses.find(x => x.id === id);
  if (e) e.settled = true;
  save(); render();
}

// ---------- 카드/카테고리 ----------
function addCard() {
  const inp = document.getElementById("newCard");
  const name = inp.value.trim();
  if (!name) return;
  cards.push({ id: "c"+Date.now().toString(36), name, color: CARD_COLORS[cards.length % CARD_COLORS.length] });
  inp.value = "";
  save(); render();
}
function removeCard(id) {
  if (expenses.some(e => e.cardId === id)) { alert("이 카드로 기록한 지출이 있어서 삭제할 수 없어요. 지출을 먼저 지워주세요."); return; }
  cards = cards.filter(c => c.id !== id);
  save(); render();
}
function addCategory() {
  const inp = document.getElementById("newCat");
  const name = inp.value.trim();
  if (!name || categories.includes(name)) return;
  categories.push(name);
  inp.value = "";
  save(); render();
}
function removeCategory(name) {
  if (expenses.some(e => e.category === name)) { alert("이 카테고리로 기록한 지출이 있어서 삭제할 수 없어요."); return; }
  categories = categories.filter(c => c !== name);
  save(); render();
}

// ---------- 백업 ----------
function exportData() {
  const blob = new Blob([JSON.stringify({ cards, categories, expenses }, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "카드지출장부_백업_" + todayStr() + ".json";
  a.click();
  URL.revokeObjectURL(a.href);
}
function importData() {
  const inp = document.createElement("input");
  inp.type = "file";
  inp.accept = ".json,application/json";
  inp.onchange = () => {
    const f = inp.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const d = JSON.parse(r.result);
        if (!d.expenses) throw new Error();
        if (!confirm("백업 파일의 데이터로 교체할까요? 지금 기기의 기록은 덮어써져요.")) return;
        cards = d.cards && d.cards.length ? d.cards : cards;
        categories = d.categories && d.categories.length ? d.categories : categories;
        expenses = d.expenses.map(e => ({ settled:false, ...e }));
        save(); render();
        alert("가져오기 완료!");
      } catch(e) { alert("백업 파일 형식이 아니에요. 이 앱에서 내보낸 파일을 선택해 주세요."); }
    };
    r.readAsText(f);
  };
  inp.click();
}

// ---------- 월 이동 / 탭 ----------
function shiftMonth(delta) {
  const [y,m] = month.split("-").map(Number);
  const d = new Date(y, m-1+delta, 1);
  month = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
  render();
}
function setTab(t) {
  tab = t;
  document.querySelectorAll(".tab").forEach(b => b.classList.toggle("on", b.dataset.tab === t));
  render();
}

// ---------- 렌더 ----------
const cardOf = id => cards.find(c => c.id === id) || { name: "삭제된 카드", color: "#999" };

function itemHTML(e, opts) {
  const c = cardOf(e.cardId);
  const top = [];
  if (opts.showCat) top.push('<span class="item-cat">'+esc(e.category)+'</span>');
  top.push('<span class="item-sub">'+Number(e.date.slice(5,7))+'/'+Number(e.date.slice(8,10))+'</span>');
  if (opts.showCard) top.push('<span class="item-sub">'+esc(c.name)+'</span>');
  return '<div class="item">'
    + '<div class="item-bar" style="background:'+c.color+'"></div>'
    + '<div class="item-body"><div class="item-top">'+top.join("")+'</div>'
    + (e.memo ? '<div class="item-memo">'+esc(e.memo)+'</div>' : '')
    + '</div><div class="item-amount">'+fmt(e.amount)+'원</div>'
    + '<button class="del-btn" onclick="'+opts.onX+'(\''+e.id+'\')" aria-label="'+opts.xLabel+'">×</button></div>';
}

function render() {
  // 헤더
  const [yy,mm] = month.split("-");
  document.getElementById("monthLabel").textContent = yy+"년 "+Number(mm)+"월";
  const mExp = expenses.filter(e => e.date.slice(0,7) === month).sort((a,b) => a.date < b.date ? 1 : -1);
  const total = mExp.reduce((s,e) => s+e.amount, 0);
  document.getElementById("totalAmount").textContent = fmt(total);

  document.getElementById("chipRow").innerHTML = cards.map(c => {
    const sum = mExp.filter(e => e.cardId === c.id).reduce((s,e) => s+e.amount, 0);
    return '<div class="card-chip"><div class="chip-band" style="background:'+c.color+'"></div>'
      + '<div class="chip-name">'+esc(c.name)+'</div><div class="chip-amount">'+fmt(sum)+'원</div></div>';
  }).join("");

  // 폼 select 갱신 (선택 유지)
  const cardSel = document.getElementById("fCard");
  const prevCard = cardSel.value;
  cardSel.innerHTML = cards.map(c => '<option value="'+c.id+'">'+esc(c.name)+'</option>').join("");
  if (cards.some(c => c.id === prevCard)) cardSel.value = prevCard;
  const catSel = document.getElementById("fCategory");
  const prevCat = catSel.value;
  catSel.innerHTML = categories.map(c => '<option value="'+esc(c)+'">'+esc(c)+'</option>').join("");
  if (categories.includes(prevCat)) catSel.value = prevCat;

  // 본문
  const el = document.getElementById("content");

  if (tab === "list") {
    if (!mExp.length) { el.innerHTML = '<div class="empty">이번 달 기록이 아직 없어요. 위에서 첫 지출을 기록해 보세요.</div>'; return; }
    const byDate = {};
    mExp.forEach(e => (byDate[e.date] = byDate[e.date] || []).push(e));
    el.innerHTML = Object.entries(byDate).sort((a,b) => a[0] < b[0] ? 1 : -1).map(([date, items]) =>
      '<div class="group"><div class="group-head"><span>'+Number(date.slice(5,7))+'월 '+Number(date.slice(8,10))+'일</span>'
      + '<span class="sub">'+fmt(items.reduce((s,e)=>s+e.amount,0))+'원</span></div>'
      + items.map(e => itemHTML(e, { showCat:true, showCard:true, onX:"removeExpense", xLabel:"완전 삭제" })).join("")
      + '</div>'
    ).join("");
  }

  else if (tab === "cat") {
    if (!mExp.length) { el.innerHTML = '<div class="empty">이번 달 기록이 아직 없어요.</div>'; return; }
    const byCat = {};
    mExp.forEach(e => (byCat[e.category] = byCat[e.category] || []).push(e));
    el.innerHTML = Object.entries(byCat)
      .map(([cat, items]) => [cat, items, items.reduce((s,e)=>s+e.amount,0)])
      .sort((a,b) => b[2]-a[2])
      .map(([cat, items, sum]) =>
        '<div class="group"><div class="group-head"><span>'+esc(cat)+'</span>'
        + '<span>'+fmt(sum)+'원 <span class="sub" style="font-size:12px">('+(total ? Math.round(sum/total*100) : 0)+'%)</span></span></div>'
        + '<div class="bar-track"><div class="bar-fill" style="width:'+(total ? sum/total*100 : 0)+'%"></div></div>'
        + '<div style="margin-top:8px">'
        + items.map(e => itemHTML(e, { showCard:true, onX:"removeExpense", xLabel:"완전 삭제" })).join("")
        + '</div></div>'
      ).join("");
  }

  else if (tab === "settle") {
    const un = expenses.filter(e => !e.settled).sort((a,b) => a.date < b.date ? 1 : -1);
    let html = '<div class="hint">카드값 결제가 끝난 건은 ×를 눌러 정리하세요. 내역·카테고리 탭에는 그대로 남아요.</div>';
    if (!un.length) html += '<div class="empty">정산할 내역이 없어요. 깔끔해요! ✓</div>';
    else html += cards.map(c => {
      const items = un.filter(e => e.cardId === c.id);
      if (!items.length) return "";
      return '<div class="group"><div class="group-head">'
        + '<span style="display:flex;align-items:center;gap:6px"><span class="color-dot" style="background:'+c.color+'"></span><span>'+esc(c.name)+'</span></span>'
        + '<span>'+fmt(items.reduce((s,e)=>s+e.amount,0))+'원</span></div>'
        + items.map(e => itemHTML(e, { showCat:true, onX:"settleExpense", xLabel:"정산 완료" })).join("")
        + '</div>';
    }).join("");
    el.innerHTML = html;
  }

  else if (tab === "settings") {
    el.innerHTML =
      '<div class="manage-title">카드</div>'
      + cards.map(c =>
          '<div class="item"><div class="item-bar" style="background:'+c.color+'"></div>'
          + '<span style="flex:1;font-size:14px">'+esc(c.name)+'</span>'
          + '<button class="del-btn" onclick="removeCard(\''+c.id+'\')" aria-label="카드 삭제">×</button></div>'
        ).join("")
      + '<div class="form-row" style="margin-top:8px"><input id="newCard" placeholder="새 카드 이름" style="flex:1">'
      + '<button class="add-btn" onclick="addCard()">추가</button></div>'
      + '<div class="manage-title gap">카테고리</div>'
      + '<div class="pill-wrap">'
      + categories.map(c => '<span class="cat-pill">'+esc(c)+'<button class="pill-del" onclick="removeCategory(\''+esc(c)+'\')" aria-label="카테고리 삭제">×</button></span>').join("")
      + '</div>'
      + '<div class="form-row"><input id="newCat" placeholder="새 카테고리" style="flex:1">'
      + '<button class="add-btn" onclick="addCategory()">추가</button></div>'
      + '<div class="manage-title gap">백업</div>'
      + '<div class="hint">데이터는 이 폰 브라우저에만 저장돼요. 폰을 바꾸거나 브라우저 데이터를 지우면 사라지니, 가끔 내보내기로 백업해 두세요.</div>'
      + '<button class="backup-btn" onclick="exportData()">데이터 내보내기 (백업 파일 저장)</button>'
      + '<button class="backup-btn" onclick="importData()">데이터 가져오기 (백업 파일 복원)</button>';
  }
}

// ---------- 시작 ----------
load();
document.getElementById("fDate").value = todayStr();
document.getElementById("fAmount").addEventListener("input", function() {
  const raw = this.value.replace(/[^0-9]/g,"");
  this.value = raw ? fmt(raw) : "";
  document.getElementById("addBtn").disabled = !raw;
});
document.getElementById("addBtn").disabled = true;
render();
</script>
</body>
</html>
